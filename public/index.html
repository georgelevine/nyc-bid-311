<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#1a1d23">
  <title>NYC BID 311 Explorer</title>

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />

  <!-- Flatpickr -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/themes/dark.css" />

  <!-- App CSS -->
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <!-- Header -->
  <header id="app-header">
    <div class="header-left">
      <button id="sidebar-toggle" class="icon-btn" aria-label="Toggle sidebar" title="Toggle filters">
        <svg viewBox="0 0 20 20" width="18" height="18" aria-hidden="true"><path fill="currentColor" d="M3 5h14v2H3zm0 4h14v2H3zm0 4h14v2H3z"/></svg>
      </button>
      <h1>NYC BID 311</h1>
      <span class="header-subtitle">Service requests by Business Improvement District</span>
    </div>
    <div class="header-right">
      <button id="export-csv-btn" class="header-link hidden" title="Download current data as CSV" aria-label="Export CSV">
        <svg viewBox="0 0 20 20" width="16" height="16" aria-hidden="true"><path fill="currentColor" d="M10 2v9.2l3.1-3.1 1.4 1.4-5.5 5.5-5.5-5.5 1.4-1.4L8 11.2V2h2zm-6 14h12v2H4v-2z"/></svg>
        <span>Export CSV</span>
      </button>
      <a href="about.html" class="header-link" title="About & methodology" aria-label="About and methodology">
        <svg viewBox="0 0 20 20" width="16" height="16" aria-hidden="true"><path fill="currentColor" d="M9 8h2v8H9V8zm0-4h2v2H9V4zm1-2a8 8 0 1 0 0 16 8 8 0 0 0 0-16zm0 14.2A6.2 6.2 0 1 1 10 3.8a6.2 6.2 0 0 1 0 12.4z"/></svg>
        <span>About</span>
      </a>
    </div>
  </header>

  <!-- Main Layout -->
  <div id="app-container">
    <!-- Sidebar / Mobile Drawer -->
    <aside id="sidebar" data-state="open">
      <!-- Drag handle — mobile only, tap to cycle states -->
      <div id="drawer-handle" aria-hidden="true">
        <div class="drawer-handle-bar"></div>
        <div id="drawer-handle-label">
          <span id="drawer-handle-title">Filters</span>
          <span id="drawer-handle-subtitle">Choose a BID to begin</span>
        </div>
      </div>

      <div id="sidebar-scroll">
        <!-- Filters -->
        <div class="sidebar-section" id="filter-section">
          <h2>Filters</h2>

          <label for="bid-search">Business Improvement District</label>
          <div id="bid-search-wrapper">
            <input type="text" id="bid-search" placeholder="Search for a BID..." autocomplete="off" />
            <div id="bid-dropdown-list" class="hidden"></div>
          </div>

          <div id="bid-info" class="bid-info hidden">
            <span id="bid-borough" class="bid-badge"></span>
            <span id="bid-year" class="bid-badge"></span>
            <a id="bid-website" href="#" target="_blank" rel="noopener" class="bid-link hidden">Website &rarr;</a>
          </div>

          <label for="date-range">Date Range</label>
          <div id="date-quick-buttons">
            <button class="date-quick" data-range="today">Today</button>
            <button class="date-quick" data-range="week">Week</button>
            <button class="date-quick active" data-range="30">30d</button>
            <button class="date-quick" data-range="90">90d</button>
            <button class="date-quick" data-range="custom">Custom</button>
          </div>
          <input type="text" id="date-range" placeholder="Select date range..." />

          <button id="load-btn" class="btn-primary" disabled>Load 311 Data</button>

          <div id="loading-indicator" class="hidden">
            <div class="spinner"></div>
            <span id="loading-text">Loading...</span>
          </div>

          <div id="error-message" class="hidden"></div>
        </div>

        <!-- Summary -->
        <div class="sidebar-section hidden" id="summary-section">
          <h2>Summary</h2>

          <div id="status-filter" class="seg-control" role="tablist" aria-label="Filter by status">
            <button class="seg-btn active" data-status="open" role="tab" aria-selected="true">Open</button>
            <button class="seg-btn" data-status="closed" role="tab" aria-selected="false">Closed</button>
            <button class="seg-btn" data-status="all" role="tab" aria-selected="false">All</button>
          </div>

          <!-- Active filter breadcrumbs — pills showing current cross-filters, each with \u00d7 -->
          <div id="active-filters" class="active-filters hidden" aria-live="polite"></div>

          <div class="stat-grid" id="stat-grid"></div>

          <h3 id="status-section-header">Status</h3>
          <div id="status-chart-container">
            <canvas id="status-chart" height="160"></canvas>
          </div>

          <h3>Top Complaint Types</h3>
          <div id="complaints-chart-container">
            <canvas id="complaints-chart" height="300"></canvas>
          </div>

          <h3>Requests Over Time</h3>
          <div id="timeline-chart-container">
            <canvas id="timeline-chart" height="200"></canvas>
          </div>
        </div>
      </div>
    </aside>

    <!-- Map -->
    <main id="map-container">
      <div id="map"></div>
      <div id="map-loading-overlay" class="hidden" role="status" aria-live="polite">
        <div class="map-loading-card">
          <div class="map-loading-spinner" aria-hidden="true"></div>
          <div>
            <div class="map-loading-title">Loading 311 data</div>
            <div id="map-loading-text">Fetching records...</div>
          </div>
        </div>
      </div>

      <!-- Legend: collapsible FAB on mobile, inline panel on desktop -->
      <div id="map-legend" class="hidden" data-state="open">
        <button id="legend-toggle" class="legend-fab" aria-label="Toggle legend" title="Layers & categories">
          <svg viewBox="0 0 20 20" width="18" height="18" aria-hidden="true"><path fill="currentColor" d="M3 4h14v2H3zm0 5h14v2H3zm0 5h14v2H3z"/></svg>
        </button>
        <div id="legend-body">
          <div id="legend-header">
            <h4>Show complaint types</h4>
            <button id="legend-close" class="legend-btn legend-close-btn" aria-label="Close layers panel" title="Close">Close</button>
          </div>
          <div id="legend-actions-row">
            <button id="legend-select-all" class="legend-btn">Show all</button>
            <button id="legend-deselect-all" class="legend-btn">Hide all</button>
          </div>
          <div id="legend-categories"></div>
          <div id="legend-layers">
            <h4>Layers</h4>
            <label class="legend-toggle"><input type="checkbox" id="toggle-parcels" checked /> BID Parcels</label>
            <label class="legend-toggle"><input type="checkbox" id="toggle-buffer" checked /> Buffered Boundary</label>
            <label class="legend-toggle"><input type="checkbox" id="toggle-heatmap" /> Heatmap</label>
          </div>
        </div>
      </div>
    </main>
  </div>

  <!-- Libraries -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
  <script src="https://unpkg.com/leaflet.heat@0.2.0/dist/leaflet-heat.js"></script>
  <script src="https://unpkg.com/@turf/turf@7/turf.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>

  <!-- App modules (utils first). Version bump busts browser cache. -->
  <script src="js/utils.js?v=22"></script>
  <script src="js/polygons.js?v=22"></script>
  <script src="js/data.js?v=22"></script>
  <script src="js/map.js?v=22"></script>
  <script src="js/filters.js?v=22"></script>
  <script src="js/summary.js?v=22"></script>
  <script src="js/app.js?v=22"></script>
</body>
</html>
